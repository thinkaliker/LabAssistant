      <!-- Updates -->
      <div x-show="page==='updates'">
        <div class="level">
          <div class="level-left">
            <h1 class="title">Updates</h1>
          </div>
          <div class="level-right">
            <div class="level-item field has-addons mb-0" x-show="updates.os.length>1 || updates.containers.length>1">
              <p class="control"><span class="button is-small is-static">Sort by host</span></p>
              <p class="control"><button class="button is-small" :class="hostSort==='name' && 'is-info is-selected'"
                  @click="hostSort='name'">Name</button></p>
              <p class="control"><button class="button is-small" :class="hostSort==='ip' && 'is-info is-selected'"
                  @click="hostSort='ip'">IP</button></p>
            </div>
            <div class="level-item"><button class="button is-info"
                :class="checkingHosts.length && 'is-loading'" :disabled="checkingHosts.length>0"
                @click="checkAllUpdates()">Check all hosts</button>
            </div>
          </div>
        </div>

        <template x-if="updateHosts().length===0">
          <p class="has-text-grey">No hosts reporting updates.</p>
        </template>
        <template x-for="hu in updateHosts()" :key="hu.hostId">
          <div class="box">
            <div class="level is-mobile">
              <div class="level-left">
                <div class="level-item has-text-weight-semibold" x-text="hu.hostName"></div>
                <div class="level-item" x-show="hu.os"><span class="tag"
                    :class="hu.os && hu.os.count>0 ? 'is-warning' : 'is-success'"
                    x-text="(hu.os ? hu.os.count : 0)+' package'+((hu.os && hu.os.count===1)?'':'s')"></span></div>
                <div class="level-item" x-show="hu.containers.length>0"><span class="tag is-warning"
                    x-text="hu.containers.length+' image'+(hu.containers.length===1?'':'s')"></span></div>
                <div class="level-item is-size-7 has-text-grey" x-show="hu.os" x-text="hu.os && hu.os.mode"></div>
              </div>
              <div class="level-right">
                <div class="level-item buttons are-small">
                  <button class="button" :class="hostChecking(hu.hostId) && 'is-loading'"
                    :disabled="!hostOnline(hu.hostId) || hostChecking(hu.hostId)"
                    @click="checkHost(hu.hostId)">check for updates</button>
                  <button class="button is-warning" :class="hostUpdating(hu.hostId) && 'is-loading'"
                    :disabled="!hostOnline(hu.hostId) || hostUpdating(hu.hostId) || ((!hu.os || hu.os.count===0) && hu.containers.length===0)"
                    @click="applyAllUpdates(hu)">apply all updates</button>
                </div>
              </div>
            </div>

            <div class="level is-mobile mb-2">
              <div class="level-left">
                <div class="level-item"><h3 class="subtitle is-6 mb-0">Host packages</h3></div>
              </div>
              <div class="level-right" x-show="hu.os && hu.os.count>0">
                <div class="level-item"><button class="button is-warning is-small"
                    :class="hostUpdating(hu.hostId) && 'is-loading'"
                    :disabled="!hostOnline(hu.hostId) || hostUpdating(hu.hostId)"
                    @click="updateHostPackages(hu)">update host packages</button></div>
              </div>
            </div>
            <template x-if="hu.os && hu.os.packages && hu.os.packages.length">
              <div style="max-height:18rem;overflow:auto">
                <table class="table is-fullwidth is-narrow is-size-7 mb-0">
                  <tbody>
                    <template x-for="pkg in hu.os.packages" :key="pkg.name">
                      <tr>
                        <td class="has-text-weight-semibold" x-text="pkg.name"></td>
                        <td class="is-family-monospace has-text-grey" x-text="pkg.current || '—'"></td>
                        <td class="has-text-grey">→</td>
                        <td class="is-family-monospace" x-text="pkg.candidate || ''"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </template>
            <template x-if="!hu.os || !hu.os.packages || !hu.os.packages.length">
              <p class="is-size-7 has-text-grey">No package updates.</p>
            </template>

            <div class="level is-mobile mt-4 mb-2">
              <div class="level-left">
                <div class="level-item">
                  <h3 class="subtitle is-6 mb-0">Container images</h3>
                </div>
              </div>
              <div class="level-right" x-show="hu.containers.length>0">
                <div class="level-item"><button class="button is-warning is-small"
                    :class="hostUpdating(hu.hostId) && 'is-loading'"
                    :disabled="!hostOnline(hu.hostId) || hostUpdating(hu.hostId)"
                    @click="updateContainers(hu)">update containers</button></div>
              </div>
            </div>
            <template x-if="hu.containers.length===0">
              <p class="is-size-7 has-text-grey">No container image updates.</p>
            </template>
            <div style="overflow-x:auto" x-show="hu.containers.length>0">
              <table class="table is-fullwidth is-narrow is-size-7 mb-0">
                <thead>
                  <tr>
                    <th>Stack</th>
                    <th>Service</th>
                    <th>Image</th>
                    <th>Change</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="c in hu.containers" :key="c.stack+'/'+c.service">
                    <tr>
                      <td x-text="c.stack"></td>
                      <td class="has-text-weight-semibold" x-text="c.service"></td>
                      <td class="has-text-grey" x-text="c.image"></td>
                      <td class="is-family-monospace">
                        <span x-show="c.current" x-text="shortDigest(c.current)+' → '+shortDigest(c.latest)"></span>
                        <span class="has-text-grey" x-show="!c.current">—</span>
                      </td>
                      <td class="has-text-right"><button class="button is-small is-warning"
                          :class="hostUpdating(c.hostId) && 'is-loading'"
                          :disabled="!hostOnline(c.hostId) || hostUpdating(c.hostId)"
                          @click="updateService(c)">update</button></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </div>
