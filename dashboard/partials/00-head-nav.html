<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LabAssistant</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/vendor/bulma-1.0.4.min.css">
  <link rel="stylesheet" href="/vendor/codemirror/codemirror.min.css">
  <link rel="stylesheet" href="/vendor/codemirror/lint.min.css">
  <!-- Our overrides must load AFTER the vendored CSS so equal-specificity rules
       (e.g. .compose-panel flex layout vs Bulma's .box) win the cascade. -->
  <link rel="stylesheet" href="/stylesheet.css">
  <script defer src="/vendor/alpine-3.14.9.min.js"></script>
</head>

<body x-data="app()" x-init="init()" :class="!needsLogin && 'has-navbar-fixed-top'">

  <nav class="navbar is-dark is-fixed-top" role="navigation" x-show="ready && !needsLogin" x-cloak>
    <div class="navbar-brand">
      <span class="navbar-item has-text-weight-bold is-size-5" :title="statusTitle()">
        <svg viewBox="0 0 24 24" width="22" height="22" style="margin-right:0.5rem;vertical-align:-0.25rem" aria-hidden="true">
          <path d="M9.5 9H14.5L20 19H4z" :fill="statusColor()"/>
          <path d="M9.5 3h5M9.5 3v6L4 19h16L14.5 9V3" fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>LabAssistant</span>
      <a role="button" class="navbar-burger" :class="navOpen && 'is-active'" aria-label="menu" :aria-expanded="navOpen"
        @click="navOpen=!navOpen">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>
    <div class="navbar-menu" :class="navOpen && 'is-active'">
      <div class="navbar-start">
        <a class="navbar-item" :class="page==='overview' && 'is-active has-text-weight-semibold'"
          @click="page='overview'; navOpen=false">Overview</a>
        <a class="navbar-item" :class="page==='hosts' && 'is-active has-text-weight-semibold'"
          @click="page='hosts'; navOpen=false">Hosts</a>
        <a class="navbar-item" :class="page==='services' && 'is-active has-text-weight-semibold'"
          @click="page='services'; navOpen=false">Services</a>
        <a class="navbar-item" :class="page==='updates' && 'is-active has-text-weight-semibold'"
          @click="page='updates'; navOpen=false">Updates</a>
        <a class="navbar-item" :class="page==='scheduler' && 'is-active has-text-weight-semibold'"
          @click="page='scheduler'; navOpen=false">Scheduler</a>
        <a class="navbar-item" :class="page==='audit' && 'is-active has-text-weight-semibold'"
          @click="page='audit'; navOpen=false">Audit</a>
      </div>
      <div class="navbar-end">
        <div class="navbar-item">
          <div class="buttons">
            <button class="button is-primary" @click="addHostOpen=true; navOpen=false">Add Host</button>
            <button class="button is-dark" title="Settings" @click="page='settings'; navOpen=false">&#9881;</button>
            <button class="button is-dark" title="Log out" x-show="authUser" @click="logout()">⎋</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Stale-manager banner: shown when the manager process restarted underneath this page
       (detected by a change in its instance marker), so the session/state is no longer valid. -->
  <div x-show="stale" x-cloak style="position:fixed; top:0; left:0; right:0; z-index:40;">
    <div class="notification is-warning is-radiusless mb-0 py-3">
      <div class="container is-flex is-align-items-center is-justify-content-space-between">
        <span><strong>The manager restarted.</strong> This page is out of date — sign in again to reconnect.</span>
        <button class="button is-warning is-inverted is-outlined" @click="reloadForLogin()">Log in again</button>
      </div>
    </div>
  </div>
